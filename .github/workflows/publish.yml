name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish to Maven Central
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Snapshot release (main branch)
            ./gradlew :radialmenu:publishAllPublicationsToOSSRHRepository -PVERSION_NAME=$(grep VERSION_NAME gradle.properties | cut -d'=' -f2)-SNAPSHOT -Pkotlin.native.ignoreDisabledTargets=true
          else
            # Stable release (v* tag)
            ./gradlew :radialmenu:publishAllPublicationsToOSSRHRepository -Pkotlin.native.ignoreDisabledTargets=true
          fi
        env:
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.key: ${{ secrets.SIGNING_KEY }}
