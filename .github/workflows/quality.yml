name: Code Quality
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      - name: Run Detekt
        run: ./gradlew :radialmenu:detekt --no-daemon --stacktrace
      - name: Run Lint
        run: ./gradlew :radialmenu:lint
      - name: Run Unit Tests
        run: ./gradlew :radialmenu:allTests
      - name: Check API compatibility
        run: ./gradlew :radialmenu:apiCheck
      - name: Build Release AAR
        run: ./gradlew :radialmenu:assembleRelease
      - name: Build Desktop
        run: ./gradlew :radialmenu:compileKotlinDesktop
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: radialmenu/build/reports/
