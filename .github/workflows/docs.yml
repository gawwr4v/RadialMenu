name: Deploy Docs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install MkDocs dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin
        
      - name: Generate Dokka HTML
        run: |
          ./gradlew :radialmenu:dokkaHtml

          # Find the actual output regardless of Dokka's chosen subdirectory
          DOKKA_OUT=$(find radialmenu/build/dokka -name "index.html" | head -1 | xargs dirname)
          
          if [ -z "$DOKKA_OUT" ]; then
            echo "ERROR: Could not find Dokka index.html under radialmenu/build/dokka/"
            find radialmenu/build/ -type d | head -30
            exit 1
          fi

          echo "Found Dokka output at: $DOKKA_OUT"
          mkdir -p docs/api
          cp -R "$DOKKA_OUT/." docs/api/
          [ -f docs/api/index.html ] || (echo "Dokka copy failed" && exit 1)

      - name: Build MkDocs
        run: mkdocs build --strict
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
