name: Deploy Docs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install MkDocs dependencies
        run: pip install mkdocs-material mkdocs-minify-plugin
        
      - name: Generate Dokka HTML
        run: |
          ./gradlew :radialmenu:dokkaHtml

          # Find where Dokka actually put its output
          echo "--- Locating Dokka output ---"
          find . -type d -name "html" | grep dokka

          mkdir -p docs/api
          cp -R radialmenu/build/dokka/html/. docs/api/ || echo "Standard path failed, check find output above"
          [ -f docs/api/index.html ] || (echo "Dokka output missing" && exit 1)

      - name: Build MkDocs
        run: mkdocs build --strict
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
