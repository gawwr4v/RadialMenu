site_name: RadialMenu
site_description: RadialMenu is a Kotlin Multiplatform radial, circular, and pie menu library for Compose Multiplatform and Android Views.
site_url: https://gawwr4v.github.io/RadialMenu
repo_url: https://github.com/gawwr4v/RadialMenu
repo_name: RadialMenu

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Customization: customization.md
  - Radial vs Circular vs Pie: alternatives.md
  - Changelog: changelog.md

theme:
  name: material
  logo: assets/radialMenuLogo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/custom.css

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - meta
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html
  - meta
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gawwr4v/RadialMenu
  analytics:
    provider: google
    property: G-LD029KLGPK
